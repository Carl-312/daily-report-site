sources:
  # 默认关闭；仅在本地/Actions 灰度中用 --agihunt on 显式启用。
  agihunt: false
  aibase: true
  techcrunch: true
  theverge: true
  syft: false           # 需要配置 SYFT_* 环境变量

# AGIHunt 的密钥只能来自运行环境中的 AGIHUNT_API_KEY。
# 请求数预算包含失败后的受控重试，避免超出服务方 1–5 次/任务的建议范围。
agihunt:
  api_base_url: https://agihunt.info/agent/v1
  skill_version: 1.2.2
  cache_ttl_seconds: 600
  request_budget: 5
  timeout_seconds: 15
  retry_wait_cap_seconds: 30
  # 仅解析 HTTP(S)_PROXY / NO_PROXY；不读取 netrc 默认认证。
  use_environment_proxy: true
  include_report: true
  core_channels:
    - models
    - research
    - coding-agents
  supplemental_channel: products
  # AGIHunt 最多保留 20 条独立候选。四频道各取前 6 条作为本地缓冲，
  # 以便在严格去重后仍有机会补足 20；这不改变 5 次 API 请求预算。
  max_articles: 20
  per_channel_limit: 6
  core_channel_quota: 3
  supplemental_quota: 3
  max_age_hours: 30
  future_tolerance_minutes: 5
  entity_limit: 2
  entity_keywords:
    - openai
    - anthropic
    - google
    - meta
    - microsoft
    - xai
    - deepseek
    - nvidia
  source_priority: 3

limits:
  max_articles: 14
  # 独立新闻条数上限；不再与抓取候选数绑定，同一聚合链接可拆出多条新闻
  max_summary_items: 10

summarize:
  prompt_path: prompts/daily.md
  prefer_chinese: true
  compress:
    title_max: 200     # 增加字符限制，适应中文混合英文新闻
    desc_max: 400      # 避免描述信息被过早截断

output:
  json_dir: data
  md_dir: content
  site_dir: dist
  publication_root: .publication

run:
  deadline_minutes: 20

# OpenAI-compatible provider behavior must be enabled per endpoint/model after
# a real positive probe and a conflicting negative probe.  Accepting a request
# field or listing a model ID is not enough to enable Structured Outputs.
llm:
  default_timeout_seconds: 180
  capability_ttl_hours: 168
  attempts_filename: summary-attempts.json
  compatible_output_contract: true
  capabilities:
    - provider: modelscope
      base_url: https://api-inference.modelscope.cn/v1
      model: ZhipuAI/GLM-5.2
      supports_chat_completions: true
      supports_json_object: false
      supports_json_schema: false
      enforces_json_schema: false
      request_mode: prompt_only
      thinking_control_parameter: enable_thinking
      thinking_control_value: false
      reasoning_field: reasoning_content
      content_shape: string_or_blocks
      max_tokens_parameter: max_tokens
      supports_temperature: true
      execution:
        delivery_mode: non_stream
        max_output_tokens: 2000
        attempt_timeout_seconds: 120
        max_attempts: 1
        retry_backoff_seconds: 1
        retryable_codes: []
