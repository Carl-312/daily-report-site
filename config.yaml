sources:
  # 默认关闭；仅在本地/Actions 灰度中显式启用 AGI Hunt 来源。
  agihunt: false
  # 独立的首页 Trending DOM 新闻源；灰度时用 --agihunt-trending on。
  agihunt_trending: false
  aibase: true
  techcrunch: true
  theverge: true
  syft: false           # 需要配置 SYFT_* 环境变量

# AGIHunt 的密钥只能来自运行环境中的 AGIHUNT_API_KEY。
# 请求数预算包含失败后的受控重试，避免超出服务方 1–5 次/任务的建议范围。
agihunt:
  api_base_url: https://agihunt.info/agent/v1
  skill_version: 1.2.2
  cache_ttl_seconds: 600
  request_budget: 5
  timeout_seconds: 15
  retry_wait_cap_seconds: 30
  # 仅解析 HTTP(S)_PROXY / NO_PROXY；不读取 netrc 默认认证。
  use_environment_proxy: true
  include_report: true
  core_channels:
    - models
    - research
    - coding-agents
  supplemental_channel: products
  # AGIHunt 最多保留 20 条独立候选。四频道各取前 6 条作为本地缓冲，
  # 以便在严格去重后仍有机会补足 20；这不改变 5 次 API 请求预算。
  max_articles: 20
  per_channel_limit: 6
  core_channel_quota: 3
  supplemental_quota: 3
  max_age_hours: 30
  future_tolerance_minutes: 5
  entity_limit: 2
  entity_keywords:
    - openai
    - anthropic
    - google
    - meta
    - microsoft
    - xai
    - deepseek
    - nvidia
  source_priority: 3

# 每次运行只用 Headless Chrome 渲染一次首页，不调用未公开的 /api 路由。
agihunt_trending:
  page_url: https://agihunt.info/
  window: 1d
  language: zh-CN
  timezone: Asia/Shanghai
  day_offset: 0
  expected_articles: 15
  minimum_articles: 10
  max_articles: 15
  render_timeout_seconds: 30
  virtual_time_budget_ms: 12000
  max_dom_bytes: 2000000
  chrome_binary: ""
  # 1–3 名会提升一级，11–15 名会降低一级。
  source_priority: 3

limits:
  max_articles: 14
  # 独立新闻条数上限；不再与抓取候选数绑定，同一聚合链接可拆出多条新闻
  max_summary_items: 10

summarize:
  prompt_path: prompts/daily.md
  prefer_chinese: true
  compress:
    title_max: 200     # 增加字符限制，适应中文混合英文新闻
    desc_max: 400      # 避免描述信息被过早截断

output:
  json_dir: data
  md_dir: content
  site_dir: dist
  publication_root: .publication

run:
  deadline_minutes: 20

enrichment:
  enabled: false
  trust_env: true
  min_articles: 10
  strict_hours: 24
  max_total_calls: 7
  max_verify_calls: 6
  max_refill_rounds: 1
  refill_max_results: 8
  verify_search_depth: basic
  enable_fuzzy_second_pass: false
  enable_official_fallback: false
  priority_refill_query: "OpenAI Anthropic AI model launch startup funding developer tools"
  official_fallback_query: "OpenAI Anthropic AI model launch startup funding developer tools"
  trusted_domains:
    priority_refill_media_whitelist:
      - thenextweb.com
      - venturebeat.com
    secondary_refill_candidate_domains:
      - reuters.com
      - arstechnica.com
    official_fallback_domains:
      - openai.com
      - anthropic.com
