name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
  pull_request:

jobs:
  p0-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: pip install -r requirements-dev.txt

      - name: Verify P0 transaction and gate contracts
        run: >-
          PYTHONPATH=. pytest -q
          tests/test_atomic_storage.py
          tests/test_publication.py
          tests/test_staged_run.py
          tests/test_publish_policy.py
          tests/test_run_clock.py
          tests/test_run_contracts.py
          tests/test_run_manifest.py

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Ruff lint
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: PYTHONPATH=. pytest

  gray-scenarios:
    needs: p0-contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: pip install -r requirements-dev.txt

      - name: Verify gray publication scenarios
        run: >-
          PYTHONPATH=. pytest -q
          tests/test_tavily_gray_regression.py
          tests/test_publish_policy.py
          tests/test_staged_run.py
          tests/test_publication.py
          tests/test_main_summary.py

      - name: Upload gray diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gray-scenario-diagnostics-${{ github.run_id }}
          path: |
            .runs/
            .pytest_cache/
          if-no-files-found: ignore
          retention-days: 7

  final-regression:
    needs: [quality, p0-contract, gray-scenarios]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: pip install -r requirements-dev.txt

      - name: Run final lint, format, and regression suite
        run: |
          ruff check .
          ruff format --check .
          PYTHONPATH=. pytest

      - name: Verify reliability documentation is present
        run: |
          test -f docs/daily-news-task-improvement-analysis.md
          test -f ARCHITECTURE.md
          test -f .planning/ROADMAP.md
