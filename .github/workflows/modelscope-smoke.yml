name: ModelScope API Smoke

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: modelscope-api-smoke
  cancel-in-progress: false

jobs:
  chat-completions:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Require ModelScope API key
        env:
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
        run: |
          if [ -z "$MODELSCOPE_API_KEY" ]; then
            echo "::error::MODELSCOPE_API_KEY is required for the smoke workflow."
            exit 1
          fi

      - name: Verify non-empty ModelScope chat completion
        env:
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
        run: python scripts/modelscope_smoke.py
