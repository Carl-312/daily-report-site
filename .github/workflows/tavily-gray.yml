# Isolated Tavily gray validation. This workflow never commits, publishes, or deploys.
name: Tavily Gray Daily

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TZ: Asia/Shanghai

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC. 12:56 UTC = 20:56 Asia/Shanghai.
    - cron: "56 12 * * *"

permissions:
  contents: read

concurrency:
  group: tavily-gray
  cancel-in-progress: false

jobs:
  tavily-gray:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve gray artifact paths
        id: paths
        shell: bash
        run: |
          run_date="$(TZ=Asia/Shanghai date +'%Y-%m-%d')"
          artifact_root="gray-artifact"
          gray_dir="$artifact_root/gray/tavily/$run_date"

          mkdir -p "$gray_dir/logs"
          cat > "$gray_dir/manifest.json" <<EOF
          {
            "date": "$run_date",
            "artifact_path": "gray/tavily/$run_date/",
            "purpose": "tavily_gray_validation"
          }
          EOF

          {
            echo "run_date=$run_date"
            echo "artifact_root=$artifact_root"
            echo "gray_dir=$gray_dir"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Apply gray experiment overrides
        shell: bash
        env:
          GRAY_DIR: ${{ steps.paths.outputs.gray_dir }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          import yaml

          config_path = Path("config.yaml")
          gray_dir = Path(os.environ["GRAY_DIR"])
          overrides_path = gray_dir / "logs" / "gray-experiment-overrides.json"

          cfg = yaml.safe_load(config_path.read_text(encoding="utf-8")) or {}
          enrichment = cfg.setdefault("enrichment", {})
          output = cfg.setdefault("output", {})
          trusted_domains = enrichment.setdefault("trusted_domains", {})

          overrides = {
              "experiment": "gray_4_36h_diversified_refill",
              "reason": "Validate a 36-hour freshness gate with query, source, and entity diversity while reusing main's fetch checkpoint architecture.",
              "enrichment": {
                  "strict_hours": 36,
                  "max_total_calls": 12,
                  "max_verify_calls": 6,
                  "max_refill_rounds": 2,
                  "refill_max_results": 10,
                  "refill_search_window_hours": 72,
                  "lenient_refill_diagnostics_enabled": True,
                  "lenient_refill_window_hours": 72,
                  "priority_refill_queries": [
                      "AI model release agents developer tools enterprise software",
                      "AI startup funding infrastructure chips robotics",
                  ],
                  "secondary_refill_queries": [
                      "machine learning research open source AI safety regulation",
                      "generative AI products cybersecurity autonomous systems",
                  ],
                  "official_fallback_queries": [
                      "AI model product research release",
                      "AI developer platform enterprise launch",
                  ],
                  "max_refill_per_domain": 2,
                  "max_refill_per_entity": 2,
                  "enable_official_fallback": True,
                  "trusted_domains": {
                      "priority_refill_media_whitelist": [
                          "reuters.com",
                          "arstechnica.com",
                          "techcrunch.com",
                      ],
                      "secondary_refill_candidate_domains": [
                          "thenextweb.com",
                          "venturebeat.com",
                      ],
                      "official_fallback_domains": [
                          "openai.com",
                          "anthropic.com",
                          "blog.google",
                          "microsoft.com",
                          "ai.meta.com",
                          "nvidia.com",
                      ],
                  },
              },
              "unchanged_safety_defaults": {
                  "production_enabled": enrichment.get("enabled", False),
                  "production_strict_hours": enrichment.get("strict_hours", 24),
              },
          }

          output["json_dir"] = str(gray_dir / "checkpoint" / "data")
          output["runs_dir"] = str(gray_dir / "checkpoint" / "runs")
          output["publication_root"] = str(
              gray_dir / "checkpoint" / "publication"
          )
          for key in (
              "strict_hours",
              "max_total_calls",
              "max_verify_calls",
              "max_refill_rounds",
              "refill_max_results",
              "refill_search_window_hours",
              "lenient_refill_diagnostics_enabled",
              "lenient_refill_window_hours",
              "priority_refill_queries",
              "secondary_refill_queries",
              "official_fallback_queries",
              "max_refill_per_domain",
              "max_refill_per_entity",
              "enable_official_fallback",
          ):
              enrichment[key] = overrides["enrichment"][key]
          for key in (
              "priority_refill_media_whitelist",
              "secondary_refill_candidate_domains",
              "official_fallback_domains",
          ):
              trusted_domains[key] = overrides["enrichment"]["trusted_domains"][key]

          config_path.write_text(
              yaml.safe_dump(cfg, allow_unicode=True, sort_keys=False),
              encoding="utf-8",
          )
          overrides_path.write_text(
              json.dumps(overrides, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          git diff -- config.yaml | tee "$GRAY_DIR/logs/gray-config-diff.patch"

      - name: Require Tavily API key
        shell: bash
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GRAY_DIR: ${{ steps.paths.outputs.gray_dir }}
        run: |
          log_file="$GRAY_DIR/logs/run.log"
          if [ -z "$TAVILY_API_KEY" ]; then
            echo "::error::TAVILY_API_KEY is required for the Tavily gray workflow." | tee -a "$log_file"
            exit 1
          fi

      - name: Run Tavily-on gray fetch checkpoint
        shell: bash
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GRAY_DIR: ${{ steps.paths.outputs.gray_dir }}
        run: |
          set -o pipefail
          log_file="$GRAY_DIR/logs/run.log"

          {
            echo "Tavily gray run date: ${{ steps.paths.outputs.run_date }}"
            echo "Command: python3 main.py fetch --enrichment on"
            echo
          } | tee -a "$log_file"

          python3 main.py fetch --enrichment on 2>&1 | tee -a "$log_file"

      - name: Collect gray outputs
        if: always()
        shell: bash
        env:
          RUN_DATE: ${{ steps.paths.outputs.run_date }}
          GRAY_DIR: ${{ steps.paths.outputs.gray_dir }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          mkdir -p "$GRAY_DIR/logs"

          checkpoint_report="$GRAY_DIR/checkpoint/data/$RUN_DATE.json"
          if [ -f "$checkpoint_report" ]; then
            cp "$checkpoint_report" "$GRAY_DIR/report.json"
          fi

          git status --short --ignored=no > "$GRAY_DIR/logs/git-status-after-run.txt" || true

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          run_date = os.environ["RUN_DATE"]
          gray_dir = Path(os.environ["GRAY_DIR"])
          report_path = gray_dir / "report.json"
          markdown_path = gray_dir / "report.md"
          summary_path = gray_dir / "enrichment-summary.json"
          summary_md_path = gray_dir / "enrichment-summary.md"

          payload = {}
          if report_path.exists():
              payload = json.loads(report_path.read_text(encoding="utf-8"))

          enrichment = payload.get("enrichment") or {}
          if not enrichment:
              enrichment = {
                  "applied": False,
                  "skip_reason": "report_json_missing",
                  "notes": ["No report.json was available for enrichment summary extraction."],
              }

          summary = {
              "date": run_date,
              "artifact_path": f"gray/tavily/{run_date}/",
              "report_json_present": report_path.exists(),
              "report_markdown_present": markdown_path.exists(),
              "article_count": len(payload.get("articles", [])) if payload else 0,
              "enrichment": enrichment,
          }

          summary_path.write_text(
              json.dumps(summary, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          lines = [
              f"# Tavily Gray Summary - {run_date}",
              "",
              f"- Artifact path: `gray/tavily/{run_date}/`",
              f"- Report JSON present: {str(summary['report_json_present']).lower()}",
              f"- Report Markdown present: {str(summary['report_markdown_present']).lower()}",
              f"- Article count: {summary['article_count']}",
              f"- Enrichment applied: {str(enrichment.get('applied', False)).lower()}",
              f"- Skip reason: {enrichment.get('skip_reason') or '-'}",
              f"- Verify calls: {enrichment.get('verify_calls', 0)}",
              f"- Refill calls: {enrichment.get('refill_calls', 0)}",
              f"- Fallback calls: {enrichment.get('fallback_calls', 0)}",
              f"- Total calls: {enrichment.get('total_calls', 0)}",
              "",
          ]
          summary_md_path.write_text("\n".join(lines), encoding="utf-8")
          PY

          python3 scripts/tavily_gray_scorecard.py "$GRAY_DIR" \
            --run-id "$GITHUB_RUN_ID_VALUE" \
            --command "python3 main.py fetch --enrichment on" \
            --new-commit "$GITHUB_SHA_VALUE"

      - name: Upload Tavily gray artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tavily-gray-${{ steps.paths.outputs.run_date }}-${{ github.run_id }}
          path: ${{ steps.paths.outputs.artifact_root }}/
          if-no-files-found: error
          retention-days: 7
