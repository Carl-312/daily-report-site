# Tavily gray validation. Scheduled main runs can commit the generated final report.
name: Tavily Gray Daily

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RETENTION_DAYS: "7"
  TZ: Asia/Shanghai

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: "Controlled gray experiment to run"
        required: true
        default: baseline
        type: choice
        options:
          - baseline
          - budget_9
          - domain_priority_media
          - wide-filter-ai-refill
      summary_mode:
        description: "Summary renderer for report.md"
        required: true
        default: offline
        type: choice
        options:
          - offline
          - llm
  schedule:
    # GitHub Actions cron uses UTC. 12:56 UTC = 20:56 Asia/Shanghai.
    - cron: "56 12 * * *"

permissions:
  contents: write

concurrency:
  group: tavily-gray
  cancel-in-progress: false

jobs:
  tavily-gray:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve gray artifact paths
        id: paths
        shell: bash
        run: |
          run_date="$(TZ=Asia/Shanghai date +'%Y-%m-%d')"
          artifact_root="gray-artifact"
          gray_dir="$artifact_root/gray/tavily/$run_date"

          mkdir -p "$gray_dir/logs"
          cat > "$gray_dir/manifest.json" <<EOF
          {
            "date": "$run_date",
            "artifact_path": "gray/tavily/$run_date/",
            "purpose": "tavily_gray_validation"
          }
          EOF

          {
            echo "run_date=$run_date"
            echo "artifact_root=$artifact_root"
            echo "gray_dir=$gray_dir"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Apply gray experiment overrides
        shell: bash
        env:
          GRAY_DIR: ${{ steps.paths.outputs.gray_dir }}
          GRAY_EXPERIMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.experiment || 'baseline' }}
        run: |
          python3 scripts/tavily_gray_experiments.py \
            --experiment "$GRAY_EXPERIMENT" \
            --config config.yaml \
            --gray-dir "$GRAY_DIR"

          git diff -- config.yaml | tee "$GRAY_DIR/logs/gray-config-diff.patch"

      - name: Require Tavily API key
        shell: bash
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GRAY_DIR: ${{ steps.paths.outputs.gray_dir }}
        run: |
          log_file="$GRAY_DIR/logs/run.log"
          if [ -z "$TAVILY_API_KEY" ]; then
            echo "::error::TAVILY_API_KEY is required for the Tavily gray workflow." | tee -a "$log_file"
            exit 1
          fi

      - name: Run Tavily-on gray report
        id: gray-run
        shell: bash
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          GRAY_DIR: ${{ steps.paths.outputs.gray_dir }}
          GRAY_SUMMARY_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.summary_mode || 'offline' }}
        run: |
          set -o pipefail
          log_file="$GRAY_DIR/logs/run.log"
          summary_args=(--offline)
          command_text="python3 main.py run --offline --enrichment on"

          if [ "$GRAY_SUMMARY_MODE" = "llm" ]; then
            summary_args=()
            command_text="python3 main.py run --enrichment on"
            if [ -z "$MODELSCOPE_API_KEY" ] && [ -z "$SILICONFLOW_API_KEY" ]; then
              echo "::error::summary_mode=llm requires MODELSCOPE_API_KEY or SILICONFLOW_API_KEY." | tee -a "$log_file"
              exit 1
            fi
          fi

          echo "command=$command_text" >> "$GITHUB_OUTPUT"

          {
            echo "Tavily gray run date: ${{ steps.paths.outputs.run_date }}"
            echo "Summary mode: $GRAY_SUMMARY_MODE"
            echo "Command: $command_text"
            echo
          } | tee -a "$log_file"

          python3 main.py run "${summary_args[@]}" --enrichment on 2>&1 | tee -a "$log_file"

      - name: Collect gray outputs
        if: always()
        shell: bash
        env:
          RUN_DATE: ${{ steps.paths.outputs.run_date }}
          GRAY_DIR: ${{ steps.paths.outputs.gray_dir }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          mkdir -p "$GRAY_DIR/logs"

          if [ -f "data/$RUN_DATE.json" ]; then
            cp "data/$RUN_DATE.json" "$GRAY_DIR/report.json"
          fi

          if [ -f "content/$RUN_DATE.md" ]; then
            cp "content/$RUN_DATE.md" "$GRAY_DIR/report.md"
          fi

          git status --short --ignored=no > "$GRAY_DIR/logs/git-status-after-run.txt" || true

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          run_date = os.environ["RUN_DATE"]
          gray_dir = Path(os.environ["GRAY_DIR"])
          report_path = gray_dir / "report.json"
          markdown_path = gray_dir / "report.md"
          summary_path = gray_dir / "enrichment-summary.json"
          summary_md_path = gray_dir / "enrichment-summary.md"

          payload = {}
          if report_path.exists():
              payload = json.loads(report_path.read_text(encoding="utf-8"))

          enrichment = payload.get("enrichment") or {}
          if not enrichment:
              enrichment = {
                  "applied": False,
                  "skip_reason": "report_json_missing",
                  "notes": ["No report.json was available for enrichment summary extraction."],
              }

          summary = {
              "date": run_date,
              "artifact_path": f"gray/tavily/{run_date}/",
              "report_json_present": report_path.exists(),
              "report_markdown_present": markdown_path.exists(),
              "article_count": len(payload.get("articles", [])) if payload else 0,
              "enrichment": enrichment,
          }

          summary_path.write_text(
              json.dumps(summary, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          lines = [
              f"# Tavily Gray Summary - {run_date}",
              "",
              f"- Artifact path: `gray/tavily/{run_date}/`",
              f"- Report JSON present: {str(summary['report_json_present']).lower()}",
              f"- Report Markdown present: {str(summary['report_markdown_present']).lower()}",
              f"- Article count: {summary['article_count']}",
              f"- Enrichment applied: {str(enrichment.get('applied', False)).lower()}",
              f"- Skip reason: {enrichment.get('skip_reason') or '-'}",
              f"- Verify calls: {enrichment.get('verify_calls', 0)}",
              f"- Refill calls: {enrichment.get('refill_calls', 0)}",
              f"- Fallback calls: {enrichment.get('fallback_calls', 0)}",
              f"- Total calls: {enrichment.get('total_calls', 0)}",
              "",
          ]
          summary_md_path.write_text("\n".join(lines), encoding="utf-8")
          PY

          python3 scripts/tavily_gray_scorecard.py "$GRAY_DIR" \
            --run-id "$GITHUB_RUN_ID_VALUE" \
            --command "${{ steps.gray-run.outputs.command }}" \
            --new-commit "$GITHUB_SHA_VALUE"

      - name: Prune retained final report window
        if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
        run: python scripts/manage_retention.py prune --keep-days "$RETENTION_DAYS"

      - name: Commit and push gray final report
        if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GRAY_DIR: ${{ steps.paths.outputs.gray_dir }}
        run: |
          safe_to_commit="$(python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          safety_path = Path(os.environ["GRAY_DIR"]) / "safety-gate.json"
          payload = json.loads(safety_path.read_text(encoding="utf-8"))
          print(str(payload.get("safe_to_commit", False)).lower())
          if not payload.get("safe_to_commit", False):
              print(f"reason={payload.get('reason')}", file=sys.stderr)
          PY
          )"
          if [ "$safe_to_commit" != "true" ]; then
            echo "::error::Tavily gray safety gate blocked final report commit. See safety-gate.json in the uploaded artifact."
            exit 1
          fi

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A content/ data/

          if ! git diff --cached --quiet; then
            git commit -m "Tavily gray final report: ${{ steps.paths.outputs.run_date }}"
            git push
            echo "Gray final report committed and pushed"
          else
            echo "No gray final report changes to commit"
          fi

      - name: Upload Tavily gray artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tavily-gray-${{ steps.paths.outputs.run_date }}-${{ github.run_id }}
          path: ${{ steps.paths.outputs.artifact_root }}/
          if-no-files-found: error
          retention-days: 7
