# Daily Report generation, retention and Pages deployment
name: Daily Report Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ARCHIVE_TAG: daily-report-archive
  RETENTION_DAYS: "7"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.pages-check.outputs.enabled }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Generate daily report
        env:
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
        run: |
          if [ -z "$MODELSCOPE_API_KEY" ]; then
            echo "Warning: MODELSCOPE_API_KEY not set, using offline mode"
            python main.py run --offline
          else
            echo "Using AI summarization"
            python main.py run
          fi

      - name: Prepare release archive assets
        if: github.ref == 'refs/heads/main'
        run: python scripts/manage_retention.py bundle --keep-days "$RETENTION_DAYS" --staging-dir .archive-staging

      - name: Ensure archive release exists
        if: github.ref == 'refs/heads/main' && hashFiles('.archive-staging/*.tar.gz') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$ARCHIVE_TAG" >/dev/null 2>&1 || \
            gh release create "$ARCHIVE_TAG" \
              --title "Daily Report Archive" \
              --notes "Long-term archive for generated data/ and content/ artifacts."

      - name: Upload archive assets to GitHub Release
        if: github.ref == 'refs/heads/main' && hashFiles('.archive-staging/*.tar.gz') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$ARCHIVE_TAG" .archive-staging/*.tar.gz --clobber
          gh release upload "$ARCHIVE_TAG" .archive-staging/archive-manifest.json --clobber

      - name: Prune generated content outside retention window
        if: github.ref == 'refs/heads/main'
        run: python scripts/manage_retention.py prune --keep-days "$RETENTION_DAYS"

      - name: Commit and push retained generated content
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A content/ data/

          if ! git diff --cached --quiet; then
            git commit -m "Daily report: $(date +'%Y-%m-%d')"
            git push
            echo "Changes committed and pushed"
          else
            echo "No changes to commit"
          fi

      - name: Check whether GitHub Pages is enabled
        id: pages-check
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          status_code=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages")
          set -e

          if [ "$status_code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled for $REPO"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled (HTTP $status_code), skip deploy-related steps"
          fi

      - name: Setup Pages
        if: steps.pages-check.outputs.enabled == 'true'
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: steps.pages-check.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload run logs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-run-logs-${{ github.run_id }}
          path: |
            daily_update.log
            *.log
            .archive-staging/archive-manifest.json
          if-no-files-found: ignore

  deploy:
    if: github.ref == 'refs/heads/main' && needs.generate-and-deploy.outputs.pages_enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate-and-deploy

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
