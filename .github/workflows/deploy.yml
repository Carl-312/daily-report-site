# Daily Report generation, retention and Pages deployment
name: Daily Report Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ARCHIVE_TAG: daily-report-archive
  RETENTION_DAYS: "7"

on:
  workflow_dispatch:
    inputs:
      skip_generate:
        description: "Rebuild from current retained content without generating today's report"
        required: false
        default: false
        type: boolean
      enable_tavily:
        description: "Force-enable Tavily enrichment (scheduled gray runs always enable it)"
        required: false
        default: false
        type: boolean
      enable_agihunt:
        description: "Manually enable AGIHunt as a shadow source for this run"
        required: false
        default: false
        type: boolean
      enable_agihunt_trending:
        description: "Force-enable the production AGI Hunt Trending source for this run"
        required: false
        default: false
        type: boolean
      publish:
        description: "Commit generated content and deploy to the production Pages site"
        required: false
        default: false
        type: boolean
      deploy_gray_pages:
        description: "Deploy an accepted publish=false preview to the isolated gray Pages site"
        required: false
        default: false
        type: boolean
  schedule:
    # Production generation remains at 00:36 UTC (08:36 Asia/Shanghai).
    - cron: "36 0 * * *"
    # Generate and deploy the formal gray edition every day at 14:00 Shanghai time.
    - cron: "0 14 * * *"
      timezone: "Asia/Shanghai"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-24.04
    outputs:
      pages_enabled: ${{ steps.pages-check.outputs.enabled }}
      publish: ${{ steps.publish-mode.outputs.publish }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve publish mode
        id: publish-mode
        shell: bash
        env:
          SHOULD_PUBLISH: ${{ github.ref == 'refs/heads/main' && (github.event.schedule == '36 0 * * *' || inputs.publish) }}
          REQUEST_GRAY_PAGES: ${{ github.event.schedule == '0 14 * * *' || inputs.deploy_gray_pages || false }}
          SKIP_GENERATE: ${{ inputs.skip_generate || false }}
          ENABLE_TAVILY: ${{ github.event.schedule == '0 14 * * *' || inputs.enable_tavily || false }}
          ENABLE_AGIHUNT_TRENDING: ${{ github.event.schedule == '0 14 * * *' || inputs.enable_agihunt_trending || false }}
        run: |
          if [ "$REQUEST_GRAY_PAGES" = "true" ]; then
            if [ "$SHOULD_PUBLISH" = "true" ]; then
              echo "::error::Gray Pages and production Pages cannot be deployed in the same run"
              exit 1
            fi
            if [ "$SKIP_GENERATE" = "true" ] || [ "$ENABLE_TAVILY" != "true" ] || [ "$ENABLE_AGIHUNT_TRENDING" != "true" ]; then
              echo "::error::Formal gray Pages requires skip_generate=false, enable_tavily=true, enable_agihunt_trending=true, publish=false"
              exit 1
            fi
            echo "Formal gray Pages deployment requested"
          fi

          if [ "$SHOULD_PUBLISH" = "true" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Publishing generated content and GitHub Pages deployment is enabled"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Preview mode: generated files will only be uploaded as workflow artifacts"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install runtime dependencies
        run: pip install -r requirements.txt

      - name: Generate daily report
        if: ${{ !inputs.skip_generate }}
        shell: bash
        env:
          ENABLE_TAVILY: ${{ github.event.schedule == '0 14 * * *' || inputs.enable_tavily || false }}
          ENABLE_AGIHUNT: ${{ inputs.enable_agihunt || false }}
          ENABLE_AGIHUNT_TRENDING: ${{ github.event.schedule == '0 14 * * *' || inputs.enable_agihunt_trending || false }}
          PUBLISH_MODE: ${{ steps.publish-mode.outputs.publish }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          AGIHUNT_API_KEY: ${{ secrets.AGIHUNT_API_KEY }}
          # Scheduled gray runs force-enable enrichment. A missing secret is
          # fail-open and appears as a stable page diagnostic code.
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          ENRICHMENT_ARGS=()
          SOURCE_ARGS=()
          if [ "$ENABLE_TAVILY" = "true" ]; then
            ENRICHMENT_ARGS=(--enrichment on)
            if [ -z "$TAVILY_API_KEY" ]; then
              echo "Warning: TAVILY_API_KEY not set; Tavily enrichment will safely fall back to deduped articles"
            else
              echo "Tavily enrichment enabled for this run"
            fi
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            ENRICHMENT_ARGS=(--enrichment off)
            echo "Tavily enrichment explicitly disabled for this manual run"
          fi

          if [ "$ENABLE_AGIHUNT" = "true" ]; then
            SOURCE_ARGS+=(--agihunt on)
            if [ "$PUBLISH_MODE" = "true" ]; then
              echo "::error::AGIHunt can only be enabled through a publish=false shadow run"
              exit 1
            fi
            if [ -z "$AGIHUNT_API_KEY" ]; then
              echo "::error::AGIHUNT_API_KEY is required when enable_agihunt=true"
              exit 1
            fi
            echo "AGIHunt explicitly enabled for this shadow run"
          fi

          if [ "$ENABLE_AGIHUNT_TRENDING" = "true" ]; then
            SOURCE_ARGS+=(--agihunt-trending on)
            CHROME_BIN=$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)
            if [ -z "$CHROME_BIN" ]; then
              echo "::warning::Chrome is unavailable; AGI Hunt Trending will degrade without blocking other sources"
            else
              export AGIHUNT_TRENDING_CHROME_BIN="$CHROME_BIN"
              "$CHROME_BIN" --version
            fi
            echo "AGI Hunt Trending explicitly enabled for this run"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            SOURCE_ARGS+=(--agihunt-trending off)
            echo "AGI Hunt Trending explicitly disabled for this manual run"
          fi

          if [ -z "$MODELSCOPE_API_KEY" ] && [ -z "$SILICONFLOW_API_KEY" ]; then
            echo "Warning: no LLM API key set, using offline mode"
            python main.py run --offline "${ENRICHMENT_ARGS[@]}" "${SOURCE_ARGS[@]}"
          else
            echo "Using AI summarization"
            python main.py run "${ENRICHMENT_ARGS[@]}" "${SOURCE_ARGS[@]}"
          fi

      - name: Validate AGIHunt shadow health
        if: ${{ inputs.enable_agihunt && success() }}
        run: >
          python scripts/agihunt_gray_health.py --runs-dir .runs --data-dir data
          --content-dir content --output agihunt-gray-health.json

      - name: Validate AGI Hunt Trending health
        if: ${{ !inputs.skip_generate && success() && (github.event_name != 'workflow_dispatch' || inputs.enable_agihunt_trending) }}
        continue-on-error: ${{ github.event.schedule != '0 14 * * *' && !inputs.deploy_gray_pages }}
        run: >
          python scripts/agihunt_trending_health.py --runs-dir .runs --data-dir data
          --output agihunt-trending-health.json

      - name: Build site from retained content
        if: ${{ inputs.skip_generate }}
        run: python main.py build

      - name: Resolve one public site edition
        id: public-edition
        if: steps.publish-mode.outputs.publish == 'true'
        shell: bash
        run: |
          SITE_DIR=$(python - <<'PY'
          from pathlib import Path
          from config import get_config
          from utils.publication import read_current_edition

          cfg = get_config()
          edition = read_current_edition(cfg.publication_root)
          print(edition.site_dir if edition else Path(cfg.site_dir).resolve())
          PY
          )
          echo "site_dir=$SITE_DIR" >> "$GITHUB_OUTPUT"
          echo "Pages will upload the selected public edition: $SITE_DIR"

      - name: Upload generated preview artifact
        if: ${{ always() && steps.publish-mode.outputs.publish != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-preview-${{ github.run_id }}
          path: |
            data/
            content/
            dist/
            agihunt-gray-health.json
            agihunt-trending-health.json
            daily_update.log
            *.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Prepare release archive assets
        if: steps.publish-mode.outputs.publish == 'true' && github.ref == 'refs/heads/main'
        run: python scripts/manage_retention.py bundle --keep-days "$RETENTION_DAYS" --staging-dir .archive-staging

      - name: Ensure archive release exists
        if: steps.publish-mode.outputs.publish == 'true' && github.ref == 'refs/heads/main' && hashFiles('.archive-staging/*.tar.gz') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$ARCHIVE_TAG" >/dev/null 2>&1 || \
            gh release create "$ARCHIVE_TAG" \
              --title "Daily Report Archive" \
              --notes "Long-term archive for generated data/ and content/ artifacts."

      - name: Upload archive assets to GitHub Release
        if: steps.publish-mode.outputs.publish == 'true' && github.ref == 'refs/heads/main' && hashFiles('.archive-staging/*.tar.gz') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$ARCHIVE_TAG" .archive-staging/*.tar.gz --clobber
          gh release upload "$ARCHIVE_TAG" .archive-staging/archive-manifest.json --clobber

      - name: Prune generated content outside retention window
        if: steps.publish-mode.outputs.publish == 'true' && github.ref == 'refs/heads/main'
        run: python scripts/manage_retention.py prune --keep-days "$RETENTION_DAYS"

      - name: Commit and push retained generated content
        if: steps.publish-mode.outputs.publish == 'true' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -A content/ data/

          if ! git diff --cached --quiet; then
            git commit -m "Daily report: $(date +'%Y-%m-%d')"
            git push
            echo "Changes committed and pushed"
          else
            echo "No changes to commit"
          fi

      - name: Check whether GitHub Pages is enabled
        id: pages-check
        if: steps.publish-mode.outputs.publish == 'true' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          status_code=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages")
          set -e

          if [ "$status_code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled for $REPO"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled (HTTP $status_code), skip deploy-related steps"
          fi

      - name: Setup Pages
        if: steps.publish-mode.outputs.publish == 'true' && steps.pages-check.outputs.enabled == 'true'
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: steps.publish-mode.outputs.publish == 'true' && steps.pages-check.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.public-edition.outputs.site_dir }}

      - name: Upload run logs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-run-logs-${{ github.run_id }}
          path: |
            daily_update.log
            *.log
            agihunt-trending-health.json
            .archive-staging/archive-manifest.json
          if-no-files-found: ignore

  deploy:
    if: github.ref == 'refs/heads/main' && needs.generate-and-deploy.outputs.publish == 'true' && needs.generate-and-deploy.outputs.pages_enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate-and-deploy

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-gray-pages:
    if: >-
      (github.event.schedule == '0 14 * * *' || inputs.deploy_gray_pages) &&
      needs.generate-and-deploy.result == 'success' &&
      needs.generate-and-deploy.outputs.publish != 'true'
    environment:
      name: gray-pages
      url: https://carl-312.github.io/daily-report-site-gray/
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    needs: generate-and-deploy

    steps:
      - name: Download the accepted preview artifact
        uses: actions/download-artifact@v4
        with:
          name: daily-report-preview-${{ github.run_id }}
          path: preview

      - name: Validate gray site payload
        shell: bash
        run: |
          test -f preview/dist/index.html
          test -f preview/agihunt-trending-health.json
          python - <<'PY'
          import json
          from pathlib import Path

          health = json.loads(
              Path("preview/agihunt-trending-health.json").read_text(encoding="utf-8")
          )
          if health.get("healthy") is not True:
              raise SystemExit("AGI Hunt Trending health did not pass")
          PY

      - name: Configure isolated gray Pages deploy key
        shell: bash
        env:
          GRAY_PAGES_DEPLOY_KEY: ${{ secrets.GRAY_PAGES_DEPLOY_KEY }}
        run: |
          if [ -z "$GRAY_PAGES_DEPLOY_KEY" ]; then
            echo "::error::GRAY_PAGES_DEPLOY_KEY is required"
            exit 1
          fi
          install -d -m 0700 "$HOME/.ssh"
          install -m 0600 /dev/null "$HOME/.ssh/gray_pages_deploy_key"
          printf '%s\n' "$GRAY_PAGES_DEPLOY_KEY" > "$HOME/.ssh/gray_pages_deploy_key"
          ssh-keyscan -t ed25519 github.com > "$HOME/.ssh/known_hosts"

      - name: Deploy the preview dist to isolated Pages repository
        shell: bash
        env:
          GRAY_PAGES_REPOSITORY: Carl-312/daily-report-site-gray
        run: |
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/gray_pages_deploy_key -o IdentitiesOnly=yes"
          git init gray-site
          git -C gray-site remote add origin "git@github.com:$GRAY_PAGES_REPOSITORY.git"
          if git -C gray-site fetch --depth=1 origin gh-pages; then
            git -C gray-site checkout -B gh-pages FETCH_HEAD
          else
            git -C gray-site checkout --orphan gh-pages
          fi

          rsync --archive --delete --exclude=.git preview/dist/ gray-site/
          touch gray-site/.nojekyll
          cat > gray-site/gray-build.json <<EOF
          {
            "source_repository": "${GITHUB_REPOSITORY}",
            "source_sha": "${GITHUB_SHA}",
            "source_run_id": "${GITHUB_RUN_ID}",
            "source_artifact": "daily-report-preview-${GITHUB_RUN_ID}",
            "channel": "formal_gray"
          }
          EOF

          git -C gray-site config user.name "GitHub Actions Bot"
          git -C gray-site config user.email "actions@github.com"
          git -C gray-site add -A
          if git -C gray-site diff --cached --quiet; then
            echo "Gray Pages already matches this artifact"
          else
            git -C gray-site commit -m "Gray preview from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
            git -C gray-site push origin HEAD:gh-pages
          fi
